<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 150" preserveAspectRatio="xMidYMax slice">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#e3f2fd" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="buildingGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1565c0" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#1565c0" stop-opacity="0.3" />
    </linearGradient>
  </defs>

  <!-- Base Gradient Background -->
  <rect width="1200" height="150" fill="url(#bgGradient)" />

  <!-- Abstract City/Building Skyline on the right -->
  <g transform="translate(600, 20)">
    <!-- Back layer (lighter) -->
    <path d="M50,130 L50,50 L120,50 L120,30 L160,30 L160,70 L250,70 L250,20 L320,20 L320,130 Z" fill="#bbdefb" opacity="0.6"/>
    
    <!-- CDC Building Silhouette (Middle layer) -->
    <g transform="translate(150, 40)" fill="url(#buildingGrad)">
      <rect x="0" y="0" width="300" height="90" rx="4" />
      <!-- Windows pattern -->
      <!-- Row 1 -->
      <rect x="15" y="15" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
      <rect x="45" y="15" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
      <rect x="75" y="15" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
      <rect x="105" y="15" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
      <rect x="135" y="15" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
      <rect x="165" y="15" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
      <rect x="195" y="15" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
      <rect x="225" y="15" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
      <rect x="255" y="15" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
      <!-- Row 2 -->
      <rect x="15" y="35" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
      <rect x="45" y="35" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
      <rect x="75" y="35" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
      <rect x="105" y="35" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
      <rect x="135" y="35" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
      <rect x="165" y="35" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
      <rect x="195" y="35" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
      <rect x="225" y="35" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
      <rect x="255" y="35" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
      <!-- Row 3 -->
      <rect x="15" y="55" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
      <rect x="45" y="55" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
      <rect x="75" y="55" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
      <rect x="105" y="55" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
      <rect x="135" y="55" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
      <rect x="165" y="55" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
      <rect x="195" y="55" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
      <rect x="225" y="55" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
      <rect x="255" y="55" width="20" height="10" rx="1" fill="#ffffff" opacity="0.4"/>
    </g>

    <!-- Trees / Greenery -->
    <g transform="translate(100, 100)" fill="#81c784" opacity="0.5">
      <circle cx="20" cy="20" r="15" />
      <circle cx="35" cy="15" r="18" />
      <circle cx="50" cy="20" r="12" />
    </g>
    <g transform="translate(380, 100)" fill="#81c784" opacity="0.5">
      <circle cx="20" cy="20" r="12" />
      <circle cx="35" cy="15" r="16" />
      <circle cx="50" cy="20" r="14" />
    </g>

    <!-- Subtle curves for modern feel -->
    <path d="M-100,130 Q100,80 300,130 T600,130" fill="none" stroke="#2196f3" stroke-width="2" opacity="0.2"/>
    <path d="M-50,130 Q150,90 350,130 T650,130" fill="none" stroke="#1565c0" stroke-width="1.5" opacity="0.15"/>
  </g>
</svg>
